name: Auto Release APK

on:
  push:
    paths:
      - 'docs/MyMediBuddyBeta-v*.apk'
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install aapt
        run: sudo apt-get update && sudo apt-get install -y aapt

      - name: Find APK file
        id: find_apk
        run: |
          APK_FILE=$(find docs -maxdepth 1 -name "MyMediBuddyBeta-v*.apk" | head -1)
          if [ -z "$APK_FILE" ]; then
            echo "No APK file matching MyMediBuddyBeta-v*.apk found in docs/"
            exit 1
          fi
          echo "apk_path=$APK_FILE" >> $GITHUB_OUTPUT

      - name: Extract APK version
        id: apk_version
        run: |
          APK_FILE="${{ steps.find_apk.outputs.apk_path }}"
          # Extract version from filename: MyMediBuddyBeta-v0.3.8.apk -> 0.3.8
          VERSION_NAME=$(basename "$APK_FILE" | sed -nE 's/MyMediBuddyBeta-v([0-9]+\.[0-9]+\.[0-9]+)\.apk/\1/p')
          if [ -z "$VERSION_NAME" ]; then
            echo "Could not determine version from filename. Expected format: MyMediBuddyBeta-vX.Y.Z.apk"
            exit 1
          fi
          echo "version=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "apk_file=$APK_FILE" >> $GITHUB_OUTPUT

      - name: Update website APK reference
        run: |
          APK_FILE="${{ steps.apk_version.outputs.apk_file }}"
          # Copy the versioned APK to the fixed name used by the website
          cp "$APK_FILE" docs/MyMediBuddy-Beta.apk
          
          # Configure git and commit the synced file
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/MyMediBuddy-Beta.apk
          
          if ! git diff --cached --quiet; then
            git commit -m "docs: sync APK to v${{ steps.apk_version.outputs.version }}"
            git push origin main
          fi

      - name: Delete existing release
        run: |
          RELEASE_ID=$(curl -s "https://api.github.com/repos/Jens-Space/mymedibuddy-testers/releases/tags/v${{ steps.apk_version.outputs.version }}" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" | jq -r '.id // empty')

          if [ -n "$RELEASE_ID" ]; then
            curl -s -X DELETE "https://api.github.com/repos/Jens-Space/mymedibuddy-testers/releases/$RELEASE_ID" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.apk_version.outputs.version }}"
          name: "MyMediBuddy v${{ steps.apk_version.outputs.version }}"
          body: "Automated release for MyMediBuddy v${{ steps.apk_version.outputs.version }}."
          files: ${{ steps.find_apk.outputs.apk_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
