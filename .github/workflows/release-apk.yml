name: Auto Release APK

on:
  push:
    paths:
      - 'docs/MyMediBuddy-Beta.apk'
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install aapt
        run: sudo apt-get update && sudo apt-get install -y aapt

      - name: Extract APK version
        id: apk_version
        run: |
          VERSION_NAME=$(aapt dump badging docs/MyMediBuddy-Beta.apk | grep versionName | sed -nE \
            "s/.*versionName='([^']+)'.*/\\1/p")
          if [ -z "$VERSION_NAME" ]; then
            echo "Could not determine APK version from docs/MyMediBuddy-Beta.apk"
            exit 1
          fi
          echo "version=$VERSION_NAME" >> $GITHUB_OUTPUT

      - name: Delete existing release
        run: |
          RELEASE_ID=$(curl -s "https://api.github.com/repos/Jens-Space/mymedibuddy-testers/releases/tags/v${{ steps.apk_version.outputs.version }}" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" | jq -r '.id // empty')

          if [ -n "$RELEASE_ID" ]; then
            curl -s -X DELETE "https://api.github.com/repos/Jens-Space/mymedibuddy-testers/releases/$RELEASE_ID" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.apk_version.outputs.version }}"
          name: "MyMediBuddy v${{ steps.apk_version.outputs.version }}"
          body: "Automated release for MyMediBuddy v${{ steps.apk_version.outputs.version }}."
          files: docs/MyMediBuddy-Beta.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
