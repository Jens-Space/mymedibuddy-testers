name: Auto Release APK

on:
  push:
    paths:
      - 'docs/MyMediBuddy-Beta.apk'
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install aapt
        run: sudo apt-get update && sudo apt-get install -y aapt

      - name: Extract APK version
        id: apk_version
        run: |
          VERSION_NAME=$(aapt dump badging docs/MyMediBuddy-Beta.apk | grep versionName | sed -nE \
            "s/.*versionName='([^']+)'.*/\\1/p")
          echo "APK_VERSION=$VERSION_NAME" >> $GITHUB_ENV
          echo "version=$VERSION_NAME" >> $GITHUB_OUTPUT

      - name: Delete existing release
        run: |
          curl -s -X DELETE "https://api.github.com/repos/Jens-Space/mymedibuddy-testers/releases/tags/v${{ env.APK_VERSION }}" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ env.APK_VERSION }}"
          name: "MyMediBuddy v${{ env.APK_VERSION }}"
          body: "Automated release for MyMediBuddy v${{ env.APK_VERSION }}."
          files: docs/MyMediBuddy-Beta.apk
          delete_empty: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
